schema_version: "1.0"
slice_id: "vol2-creation-001"
criteria:
  - id: "preserved-language-integrity"
    requirement: "All Greek and Hebrew spans from the source excerpt remain unchanged in the translation output."
    status_values: "pass|fail|incomplete"
  - id: "glossary-adherence"
    requirement: "Required glossary targets appear where the source excerpt exercises those source terms."
    status_values: "pass|fail|incomplete"
  - id: "prose-quality"
    requirement: "English output reads as coherent formal theological prose without flattening argument structure."
    status_values: "pass|fail|incomplete"
  - id: "review-flagging"
    requirement: "Reviewer findings explicitly call out preservation risks, doctrinal ambiguity, and unresolved quality issues."
    status_values: "pass|fail|incomplete"
